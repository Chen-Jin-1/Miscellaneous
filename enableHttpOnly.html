<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如何开启 HttpOnly Cookie 权限</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #f8f9fa;
            color: #333;
        }
        h1 { font-size: 1.8rem; border-bottom: 3px solid #667eea; padding-bottom: 12px; }
        .step {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .step h2 {
            font-size: 1.1rem;
            margin-top: 0;
            color: #667eea;
        }
        .step .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            margin-right: 10px;
        }
        .screenshot-placeholder {
            background: #e9ecef;
            border: 2px dashed #adb5bd;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            color: #6c757d;
            margin: 12px 0;
            font-size: 0.9rem;
        }
        img {
            margin-top: 8px;
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        .note strong { color: #856404; }
        code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>开启 HttpOnly Cookie 读写权限</h1>
    <div class="note"><strong>该功能仅在暴力猴 2.35.1 及以上版本存在，若版本低于 2.35.1，请更新暴力猴</strong></div>
    <br>
    <div class="step">
        <h2><span class="badge">1</span> 开启全局设置</h2>
        <p>1. 打开暴力猴管理面板<br>2. 点击左侧「设置」<br>3. 找到「脚本设置」栏，勾选 <code>Allow GM_cookie to access HTTP-only cookies</code></p>
        <img src="https://zhishi.oss-cn-beijing.aliyuncs.com/post/692538ef86bbc77f84e3b259/7f40085fda032d7e61c04a14106b8156.jpg" alt="全局设置截图">
    </div>

    <div class="step">
        <h2><span class="badge">2</span> 开启脚本单独设置</h2>
        <p>1. 在暴力猴管理面板中找到需要开启的脚本，点击「&lt;/&gt;」<br>2. 点击「设置」<br>3. 勾选 <code>Allow GM_cookie to access HTTP-only cookies</code><br>4. 保存</p>
        <img src="https://m.ccw.site/post/692538ef86bbc77f84e3b259/02af64b9dde8d594ee92affd23eda99e.png" alt="脚本设置截图">
    </div>
</body>
</html>
