<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <link rel="stylesheet" href="assets/jx.css">
    <title>杂物间</title>
    <!-- <base target="_blank"> -->
    <style>
        body {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 2px 15px var(--glow-color);
            user-select: none;
        }
        
        #bio {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 3px;
            margin: 16px 0 40px 0;
            position: relative;
            text-transform: uppercase;
        }
        
        #bio::before,
        #bio::after {
            content: "◆";
            color: var(--accent-primary);
            margin: 0 12px;
            font-size: 12px;
            opacity: 0.6;
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 20%;
            max-width: 300px;
        }
        
        .title {
            animation: fadeIn 0.8s ease-out forwards;
        }
        
        #bio {
            animation: fadeIn 0.8s ease-out forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }
        
        .button-container {
            animation: fadeIn 0.8s ease-out forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }
        
        @media (max-width: 640px) {
            body {
                font-size: 36px;
                letter-spacing: 3px;
            }
            
            #bio {
                font-size: 14px;
                letter-spacing: 2px;
            }
            
            #bio::before,
            #bio::after {
                margin: 0 8px;
                font-size: 10px;
            }
            
            .button-container {
                max-width: 280px;
                gap: 14px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                font-size: 28px;
                letter-spacing: 2px;
            }
            
            #bio {
                font-size: 12px;
                margin: 12px 0 32px 0;
            }
            
            .button-container {
                max-width: 240px;
                gap: 12px;
            }
        }
    </style>
</head>
<body class="flex-center flex-col">
    <div class="title">Miscellaneous</div>
    <div id="bio">杂物堆积处</div>
    <div class="button-container">
        <a href="https://www.chen-jin.cc.cd/" class="btn next" style="max-width: 200px; margin: auto; width: inherit;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H4a2 2 0 0 1-2-2z"></path>
            </svg>
            主页
        </a>
    </div>
</body>
</html>
