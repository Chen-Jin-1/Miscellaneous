<!DOCTYPE html>
<html style>
    <head>
        <style>
            @font-face {
                font-family: 'pf';
                src: url('https://m.ccw.site/community/fonts/PingFang.ttf');
            }
            #particles-js {
                inset: 0;
                position: fixed;
                z-index: -1;
            }
        </style>
    </head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <body style="height: 100vh; background: #000; color: #fff; font-family: 'pf'; user-select: none; font-size: 3vw; display: flex; justify-content: center; flex-direction: column; overflow: hidden; margin: 0; align-items: center;">
        <div id="particles-js"></div>
        <span style="font-size: 5vw; /* color:red;margin-bottom: 1vw; */">你被 Ch2Chat 封禁了</span>
        <!-- 若为误判，请联系作者处理 -->
        <button style="margin-top: 2vw; background: transparent; color: white; border: none; font-size: 3vw; border-radius: 3vw; transition-duration: 0.3s; padding: 1vw 3vw; display: none;" onclick="history.back()" onmouseover="this.style.background = '#ffffffaa'" onmouseout="this.style.background = 'transparent'">返回</button>
        <script>
            particlesJS('particles-js', {
                particles: {
                    number: { value: 40 },
                    color: { value: '#00aeff' },
                    shape: { type: 'circle' },
                    opacity: { value: 0.6 },
                    size: { value: 4 },
                    line_linked: {
                        enable: true,
                        distance: 200,
                        color: '#00aeff',
                        opacity: 0.3,
                        width: 2
                    },
                    move: { speed: 1 }
                },
                retina_detect: true
            });
        </script>
    </body>
</html>
